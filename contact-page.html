<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant App | Contact</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
      color: #333;
    }
    header nav {
      background-color: #222;
      padding: 1rem 2rem;
      display: flex;
      gap: 1rem;
    }
    header nav a {
      color: #eee;
      text-decoration: none;
      font-weight: bold;
    }
    header nav a:hover,
    header nav a:focus {
      text-decoration: underline;
    }
    main {
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    h1, h2 {
      color: #222;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: #f9f9f9;
      padding: 1.5rem;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    label {
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    input[type="text"],
    input[type="email"],
    textarea {
      padding: 0.6rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }
    textarea {
      min-height: 100px;
    }
    button {
      background-color: #007acc;
      color: white;
      border: none;
      padding: 0.8rem 1.2rem;
      font-size: 1.1rem;
      border-radius: 4px;
      cursor: pointer;
      align-self: flex-start;
    }
    button:hover,
    button:focus {
      background-color: #005fa3;
    }
    .map-container {
      margin-top: 2rem;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    iframe {
      width: 100%;
      height: 350px;
      border: none;
    }
  </style>
</head>
<body>
  <header>
    <nav aria-label="Main navigation">
      <a href="index.html#home">Home</a>
      <a href="index.html#offerings">Offerings</a>
      <a href="index.html#about">About</a>
      <a href="index.html#menu">Menu</a>
      <a href="index.html#story">Story</a>
      <a href="contact-page.html#contact-form">Contact</a>
    </nav>
  </header>

  <main>
    <section id="contact-form" aria-label="Contact form">
      <h1>Contact Our Restaurant</h1>
      <p>Please fill out the form below to get in touch. We look forward to hearing from you!</p>
      <form action="#" method="post" novalidate>
        <div>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required autocomplete="name" />
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div>
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" required />
        </div>
        <div>
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit">Send Message</button>
      </form>
    </section>

    <section class="map-container" aria-label="Location map">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.511571714948!2d-122.42067968468143!3d37.77928027975881!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085808bc38130cf%3A0x3d376ef4ffd4e6d0!2s128%20Market%20St%2C%20San%20Francisco%2C%20CA%2094105!5e0!3m2!1sen!2sus!4v1686422481502!5m2!1sen!2sus"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="Map showing location of the restaurant">
      </iframe>
    </section>
  </main>
</body>
</html>
